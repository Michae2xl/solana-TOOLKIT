<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f0f"/>
    </linearGradient>
    <linearGradient id="solGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="50%" style="stop-color:#14F195"/>
      <stop offset="100%" style="stop-color:#00D1FF"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9945FF;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#9945FF;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#14F195;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#00D1FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00D1FF;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="16"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#14F195">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="100" cy="80" r="2" fill="#9945FF" opacity="0.3"/>
  <circle cx="180" cy="45" r="1.5" fill="#14F195" opacity="0.4"/>
  <circle cx="1050" cy="70" r="2" fill="#00D1FF" opacity="0.3"/>
  <circle cx="1100" cy="230" r="1.5" fill="#9945FF" opacity="0.3"/>
  <circle cx="150" cy="250" r="1.5" fill="#14F195" opacity="0.2"/>

  <!-- Solana logo mark (simplified) -->
  <g transform="translate(80, 105)" filter="url(#glow)">
    <!-- Three parallelogram bars -->
    <path d="M0 72 L8 80 L80 80 L72 72Z" fill="url(#solGrad)" opacity="0.9"/>
    <path d="M0 44 L8 36 L80 36 L72 44Z" fill="url(#solGrad)" opacity="0.9"/>
    <path d="M0 58 L8 66 L80 66 L72 58Z" fill="url(#solGrad)" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="190" y="145" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-2">
    <tspan fill="#ffffff">Solana </tspan>
    <tspan fill="url(#solGrad)">TOOLKIT</tspan>
  </text>

  <!-- Subtitle -->
  <text x="195" y="178" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#888888" font-weight="400" letter-spacing="0.5">
    From scaffold to mainnet — build, test, audit, deploy
  </text>

  <!-- Gradient line separator -->
  <rect x="100" y="200" width="1000" height="1.5" fill="url(#lineGrad)" rx="1"/>

  <!-- Feature badges -->
  <g transform="translate(195, 225)" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" font-weight="600">
    <!-- Anchor -->
    <rect x="0" y="0" width="80" height="28" rx="6" fill="#9945FF" fill-opacity="0.12" stroke="#9945FF" stroke-opacity="0.3" stroke-width="1"/>
    <text x="40" y="18" fill="#9945FF" text-anchor="middle">Anchor</text>

    <!-- AI Agents -->
    <rect x="96" y="0" width="100" height="28" rx="6" fill="#14F195" fill-opacity="0.12" stroke="#14F195" stroke-opacity="0.3" stroke-width="1"/>
    <text x="146" y="18" fill="#14F195" text-anchor="middle">15 AI Agents</text>

    <!-- Fuzz -->
    <rect x="212" y="0" width="100" height="28" rx="6" fill="#00D1FF" fill-opacity="0.12" stroke="#00D1FF" stroke-opacity="0.3" stroke-width="1"/>
    <text x="262" y="18" fill="#00D1FF" text-anchor="middle">Fuzz Testing</text>

    <!-- Formal Verification -->
    <rect x="328" y="0" width="140" height="28" rx="6" fill="#9945FF" fill-opacity="0.12" stroke="#9945FF" stroke-opacity="0.3" stroke-width="1"/>
    <text x="398" y="18" fill="#9945FF" text-anchor="middle">Formal Verification</text>

    <!-- CI/CD -->
    <rect x="484" y="0" width="68" height="28" rx="6" fill="#14F195" fill-opacity="0.12" stroke="#14F195" stroke-opacity="0.3" stroke-width="1"/>
    <text x="518" y="18" fill="#14F195" text-anchor="middle">CI/CD</text>

    <!-- E2E -->
    <rect x="568" y="0" width="80" height="28" rx="6" fill="#00D1FF" fill-opacity="0.12" stroke="#00D1FF" stroke-opacity="0.3" stroke-width="1"/>
    <text x="608" y="18" fill="#00D1FF" text-anchor="middle">E2E Tests</text>
  </g>
</svg>
